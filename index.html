<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Energy Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>⚡ Energy Consumption Tracker</h1>
  <button id="toggleDark">🌙</button>
</header>

<div class="container">

  <div class="card">
    <h2>Add Appliance</h2>
    <input type="text" id="name" placeholder="Appliance name">
    <input type="number" id="watts" placeholder="Watts">
    <input type="number" id="hours" placeholder="Hours per day">
    <button onclick="addAppliance()">Add</button>
  </div>

  <div class="card">
    <h2>Appliance List</h2>
    <ul id="list"></ul>
  </div>

  <div class="card">
    <h2>Summary</h2>
    <p>Total kWh: <span id="totalKwh">0</span></p>
    <p>Total Cost: ₱<span id="totalCost">0</span></p>
    <p id="insight"></p>
  </div>

  <div class="card">
    <h2>Consumption Chart</h2>
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
