<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy AI Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard">

<aside class="sidebar">
  <h2>⚡ EnergyAI</h2>
</aside>

<main class="main">

<div class="topbar">
  <h1>Energy Intelligence</h1>
</div>

<div class="stats">
  <div class="stat"><h3>Total kWh</h3><p id="kwh">0</p></div>
  <div class="stat"><h3>Cost</h3><p id="cost">0</p></div>
  <div class="stat"><h3>Predicted</h3><p id="prediction">0</p></div>
  <div class="stat"><h3>Devices</h3><p id="devices">0</p></div>
</div>

<div class="grid">

<div class="card">
  <h3>Add Appliance</h3>
  <input id="name" placeholder="Appliance">
  <input id="watts" type="number" placeholder="Watts">
  <input id="hours" type="number" placeholder="Hours/day">
  <button onclick="addAppliance()">Add</button>
  <button onclick="resetData()" style="background:red;">Reset</button>
</div>

<div class="card">
  <h3>AI Insight</h3>
  <p id="insight"></p>
  <ul id="list"></ul>
</div>

<div class="card full">
  <h3>Energy Usage</h3>
  <canvas id="usageChart"></canvas>
</div>

<div class="card">
  <h3>Cost Trend</h3>
  <canvas id="costChart"></canvas>
</div>

<div class="card">
  <h3>Energy Distribution</h3>
  <canvas id="intensityChart"></canvas>
</div>

</div>

</main>
</div>

<script src="script.js"></script>
</body>
</html>
